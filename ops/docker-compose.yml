
version: "3.9"
services:
  api:
    build: ../backend
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
  web:
    working_dir: /app
    image: node:20-alpine
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
    environment:
      - NODE_ENV=development
    depends_on:
      - api

